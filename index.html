<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        var dark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>
    <style>
      body { background-color: hsl(347, 40%, 5%); }
      html:not(.dark) body { background-color: hsl(0, 0%, 99%); }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promotley - AI-driven marknadsföring för UF-företag</title>

    <meta name="author" content="Promotley" />
    <meta name="keywords" content="AI marknadsföring, sociala medier analys, UF-företag, content marketing, Instagram analys, TikTok marknadsföring" />
    
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta property="og:title" content="Promotley - AI-driven marknadsföring för UF-företag" />
    <meta property="og:description" content="Få AI-genererade innehållsförslag och smarta insikter för dina sociala medier. Börja gratis idag!" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts - Poppins -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>

</html>
